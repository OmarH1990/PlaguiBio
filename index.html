<style>
  :root{
    --pb-navy:#081a3d; --pb-navy-2:#0c265c; --pb-teal:#13315c; --pb-teal-2:#1c4480;
    --pb-green:#78c13b; --pb-green-2:#65a628;
    --pb-bg:#f4f7fb; --pb-card:#ffffff; --pb-muted:#64748b; --pb-border:#e6ecf3;
    --pb-orange:#ff7a45; --pb-purple:#7c5cff; --pb-pink:#ff5c8a; --pb-yellow:#ffb020;
    --pb-blue:#3b82f6; --pb-red:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{background:var(--pb-bg);font-family:'Inter',system-ui,-apple-system,sans-serif;color:#0f172a;margin:0}
  .top-accent{height:6px;background:linear-gradient(90deg,var(--pb-teal) 0%,var(--pb-teal) 55%,var(--pb-green) 55%,var(--pb-green) 100%)}
  .card{background:#fff;border:1px solid var(--pb-border);border-radius:18px;box-shadow:0 1px 3px rgba(15,31,77,.04)}
  .card-soft{background:#fff;border-radius:18px;box-shadow:0 4px 16px rgba(11,37,69,.06)}
  .chip{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:999px;font-size:.7rem;font-weight:700;letter-spacing:.02em}
  .chip-green{background:#e8f9df;color:#3f9d10} .chip-navy{background:#e6ecf7;color:#0b2545}
  .chip-teal{background:#dff5f6;color:#0c7c80} .chip-red{background:#fee;color:#c53030}
  .chip-amber{background:#fff3d6;color:#a86b00} .chip-purple{background:#ece7ff;color:#5b3fd1}
  .chip-orange{background:#fff0e6;color:#ea580c} .chip-blue{background:#e0f2fe;color:#0284c7}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1rem;border-radius:12px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
  .btn:disabled{opacity:0.6;cursor:not-allowed}
  .btn-primary{background:var(--pb-teal);color:#fff} .btn-primary:hover:not(:disabled){background:var(--pb-teal-2)}
  .btn-green{background:var(--pb-green);color:#fff} .btn-green:hover:not(:disabled){background:var(--pb-green-2)}
  .btn-navy{background:var(--pb-navy);color:#fff} .btn-navy:hover:not(:disabled){background:var(--pb-navy-2)}
  .btn-outline{background:#fff;border-color:var(--pb-border);color:var(--pb-navy)} .btn-outline:hover:not(:disabled){background:#f1f5fb}
  .btn-danger{background:#ef4444;color:#fff} .btn-danger:hover:not(:disabled){background:#dc2626}
  .btn-ghost{background:transparent;color:var(--pb-navy)} .btn-ghost:hover:not(:disabled){background:#f1f5fb}
  .input,.select,.textarea{width:100%;padding:.6rem .85rem;border:1px solid var(--pb-border);border-radius:12px;font-size:.875rem;background:#fff}
  .input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--pb-teal);box-shadow:0 0 0 3px rgba(17,153,158,.12)}
  .input[readonly],.select[disabled],.textarea[readonly]{background:#f8fafc;cursor:not-allowed;color:#64748b}
  .label{font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;display:block}
  .nav-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 1rem;border-radius:12px;color:#cbd5e1;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .15s}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:linear-gradient(135deg,var(--pb-teal),var(--pb-green));color:#fff;box-shadow:0 6px 18px rgba(17,153,158,.35)}
  .nav-item .ic{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1rem}
  .nav-item.active .ic{background:rgba(255,255,255,.18)}
  .kpi{display:flex;flex-direction:column;gap:.4rem;padding:1.1rem 1.2rem;background:#fff;border:1px solid var(--pb-border);border-radius:18px}
  .kpi-top{display:flex;align-items:center;gap:.85rem}
  .kpi-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#fff}
  .kpi-val{font-size:1.6rem;font-weight:800;color:#0b2545;line-height:1}
  .kpi-lbl{font-size:.8rem;color:#64748b;margin-top:.1rem}
  .pipe-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;align-items:start}
  .stage-card{background:#fff;border-radius:18px;border:1px solid var(--pb-border);overflow:hidden;display:flex;flex-direction:column;min-height:200px;max-height:75vh;box-shadow:0 2px 8px rgba(11,37,69,.05)}

  .tab.active{background:var(--pb-navy);color:#fff}
  table{width:100%;font-size:.85rem;border-collapse:collapse}

  td{padding:.85rem;border-top:1px solid #f1f5f9}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cal-cell{background:#fff;border:1px solid var(--pb-border);border-radius:10px;min-height:96px;padding:.4rem;font-size:.75rem;position:relative;transition:all .2s}
  .cal-cell.drag-over{background:#eef2f6;border-color:var(--pb-blue);border-style:dashed}
  .cal-cell .d{position:absolute;top:.3rem;right:.5rem;color:#94a3b8;font-weight:600;font-size:.7rem}

  .cal-evt.cancelado{background:#fee;color:#c53030;text-decoration:line-through}

  .pulse{position:relative}
  .pulse::before{content:"";position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:var(--pb-green);box-shadow:0 0 0 0 rgba(82,196,26,.6);animation:p 1.6s infinite}

<script>
function showModal(html){
  document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal p-6 relative"><button class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 font-bold" onclick="closeModal()">✕</button>${html}</div></div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

function appAlert(msg, title='Aviso') {
    showModal(`<h3 class="text-lg font-bold mb-3 text-navy">${title}</h3><p class="text-slate-600">${msg}</p><div class="mt-5 text-right"><button class="btn btn-primary" onclick="closeModal()">Aceptar</button></div>`);
}
function appPrompt(msg, cb, title='Entrada requerida', placeholder='...') {
    window._promptCb = cb;
    showModal(`<h3 class="text-lg font-bold mb-3 text-navy">${title}</h3><p class="mb-2 text-slate-600 text-sm">${msg}</p><input id="prompt-val" class="input mb-4" placeholder="${placeholder}" autofocus/><div class="text-right flex gap-2 justify-end"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="if(document.getElementById('prompt-val').value.trim()){closeModal(); window._promptCb(document.getElementById('prompt-val').value.trim());}else{appAlert('Debes ingresar un valor');}">Aceptar</button></div>`);
}

// Helpers para guardar individualmente
async function dbUpsert(table, data) {
    const { error } = await supabaseClient.from(table).upsert(data);
    if (error) console.error(`Error Upsert en ${table}:`, error.message);
}
async function dbDelete(table, id) {
    const { error } = await supabaseClient.from(table).delete().eq('id', id);
    if (error) console.error(`Error Delete en ${table}:`, error.message);
}

async function loadDB(){ 
    try {
        const { data: configData, error } = await supabaseClient.from('pb_config').select('*').eq('id', 1).single();
        if (error && error.code !== 'PGRST116') {
             console.error("Faltan tablas relacionales:", error);
             alert("⚠️ Error en Supabase ⚠️\nParece que no has ejecutado el nuevo código SQL. Ve al editor de Supabase y ejecuta el bloque de creación de tablas.");
             return;
        }

        if (!configData) {
            console.log("Inicializando tablas Relacionales en Supabase...");
            DB = seedDB();
            await initializeCloudDB(); 
        } else {
            console.log("Cargando datos desde la nube relacional...");
            const [u, l, q, s, f, m] = await Promise.all([
                supabaseClient.from('pb_users').select('*'),
                supabaseClient.from('pb_leads').select('*'),
                supabaseClient.from('pb_quotes').select('*'),
                supabaseClient.from('pb_services').select('*'),
                supabaseClient.from('pb_finances').select('*'),
                supabaseClient.from('pb_marketing').select('*')
            ]);
            
            DB = {
                users: u.data || [], leads: l.data || [], quotes: q.data || [],
                services: s.data || [], finances: f.data || [], marketing: m.data || [],
                catalogs: configData.catalogs, company: configData.company, 
                stages: configData.stages, settings: configData.settings
            };
        }
    } catch(e) {
        console.error('Error general de conexión:', e);
        alert("Problema de red. Funcionando con base de datos local vacía por defecto.");
        DB = seedDB();
    }
}

async function initializeCloudDB() {
    await dbUpsert('pb_config', { id: 1, catalogs: DB.catalogs, company: DB.company, stages: DB.stages, settings: DB.settings });
    if(DB.users.length) await supabaseClient.from('pb_users').upsert(DB.users);
    if(DB.leads.length) await supabaseClient.from('pb_leads').upsert(DB.leads);
    if(DB.quotes.length) await supabaseClient.from('pb_quotes').upsert(DB.quotes);
    if(DB.services.length) await supabaseClient.from('pb_services').upsert(DB.services);
    if(DB.finances.length) await supabaseClient.from('pb_finances').upsert(DB.finances);
    if(DB.marketing.length) await supabaseClient.from('pb_marketing').upsert(DB.marketing);
}

function saveConfig() {
    dbUpsert('pb_config', { id: 1, catalogs: DB.catalogs, company: DB.company, stages: DB.stages, settings: DB.settings });
}
// --- FIN CONFIGURACIÓN SUPABASE ---

function currentUser(){ return DB.users.find(u=>u.id===session?.userId); }
function isAdmin(){ return currentUser()?.rol==='admin'; }
function isVentas(){ return currentUser()?.rol==='ventas'; }
function isTecnico(){ return currentUser()?.rol==='tecnico'; }

async function doLogin(){
  const e=document.getElementById('li-email').value.trim().toLowerCase();
  const p=document.getElementById('li-pass').value;
  if(!e || !p) { appAlert('Ingresa correo y contraseña'); return; }

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
  if (error) { appAlert('Credenciales inválidas o error de red: ' + error.message); return; }

  const u = DB.users.find(x => x.email.toLowerCase() === e);
  if(!u){ appAlert('Autenticado correctamente, pero el usuario no está registrado en el sistema ERP interno.'); return; }

  session={userId:u.id, rol:u.rol}; 
  sessionStorage.setItem('pb_sess_v11',JSON.stringify(session));
  showApp();
}

async function recuperarPassword() {
    const e = document.getElementById('li-email').value.trim().toLowerCase();
    if(!e) { appAlert('Por favor, escribe tu correo en el campo superior y presiona este botón de nuevo.'); return; }
    const { data, error } = await supabaseClient.auth.resetPasswordForEmail(e);
    if(error) { appAlert('Error al enviar el correo: ' + error.message); } 
    else { appAlert('Se ha enviado un enlace de recuperación a tu correo electrónico.'); }
}

function destroyCharts(group) {
    if(dashCharts[group]) {
        Object.keys(dashCharts[group]).forEach(k => {
            if(dashCharts[group][k]) dashCharts[group][k].destroy();
        });
        dashCharts[group] = {};
    }
}

function go(page){
  const u=currentUser();
  const route=NAV.find(x=>x.id===page);
  if(!route || !route.roles.includes(u.rol)){ appAlert('Acceso denegado'); return; }
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.toggle('active',x.dataset.id===page));
  
  const titles={
    dashboard:['Dashboard','Panel ejecutivo'], pipeline:['Pipeline de Ventas','Gestión dinámica de prospectos'],

  };
  document.getElementById('page-title').textContent=titles[page][0];
  document.getElementById('page-sub').textContent=titles[page][1];

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function inPeriod(ts, mes, anio){ 
  if(!ts)return false; const d=new Date(ts); 
  if(anio && d.getFullYear()!=anio) return false; 
  if(mes>=0 && d.getMonth()!=mes) return false; 
  return true; 
}

function debounce(fn, ms=300){ clearTimeout(debounceTimer); debounceTimer=setTimeout(fn, ms); }

      </div>

function dropLead(e, destStageId){
  const id=e.dataTransfer.getData('lead_id'); if(!id)return;
  const l=DB.leads.find(x=>x.id===id); const cur=DB.stages.find(x=>x.id===l.stageId); const dest=DB.stages.find(x=>x.id===destStageId);
  
  if(dest.order < cur.order){ appAlert('No se recomienda retroceder de etapa. Edita el registro si es un caso especial.'); return; }
  
  l.stageId=destStageId;
  dbUpsert('pb_leads', l);

  // Regla 2: Generación automática de borrador al entrar a Cotización
  if(destStageId===DB.settings.stageQuoteId && !DB.quotes.find(q=>q.leadId===l.id)){
    const newQ = {
        id:uid('Q'), leadId:l.id, fecha:Date.now(), visitas:1, costoVisita:0, total:0, status:'borrador', asesorId:session.userId,
        visitas_detalle: [{id:uid('vd'), concepto: 'Visita Inicial', monto: 0}]
    };
    DB.quotes.push(newQ);
    dbUpsert('pb_quotes', newQ);
    appAlert('Se generó Cotización Borrador para '+l.nombre, 'Automatización');
  }
  renderPipeGrid();
}

function editQuote(id){
  const q = DB.quotes.find(x=>x.id===id);
  window._tmpQuote = JSON.parse(JSON.stringify(q));
  
  if(!window._tmpQuote.visitas_detalle) {
      window._tmpQuote.visitas_detalle = Array.from({length: window._tmpQuote.visitas || 1}).map((_, i) => ({
          id: uid('vd'), concepto: 'Visita ' + (i+1), monto: window._tmpQuote.costoVisita || 0
      }));
  }

  showModal(`
    <h3 class="text-lg font-extrabold mb-4 text-navy">Cotización ${q.id}</h3>

  q.visitas_detalle = window._tmpQuote.visitas_detalle;

async function changeQStatus(id,st){
  const q=DB.quotes.find(x=>x.id===id); q.status=st;
  dbUpsert('pb_quotes', q);

  if(st==='aceptada'){
    const l=DB.leads.find(x=>x.id===q.leadId);
    let newServs = [];
    
    const det = q.visitas_detalle || Array.from({length: q.visitas||1}).map((_,i)=>({concepto:'Visita '+(i+1), monto: q.costoVisita||0}));
    
    det.forEach((v, i) => {
        const ns = {
            id: uid('S'), folio: 'V'+Date.now().toString().slice(-6)+(i+1), leadId: q.leadId, quoteId: q.id, 
            plaga: l?.plaga, monto: v.monto, notes: v.concepto, tipo: 'normal', status: 'creado', 
            fecha: null, tecnicoId: null, gastos: []
        };
        DB.services.push(ns); 
        newServs.push(ns);
    });

    if(newServs.length) await supabaseClient.from('pb_services').upsert(newServs);
    
    if(l) { 
        const s4 = DB.stages.find(s=>s.order===3);
        if(s4) l.stageId = s4.id; 
        dbUpsert('pb_leads', l); 
    }
    appAlert(`Cotización Aceptada. Se han programado ${det.length} servicios en estado pendiente.`);
  }
  
  if(st==='rechazada'){
    const l=DB.leads.find(x=>x.id===q.leadId);
    if(l){ l.status='descartado'; l.motivoDescarte='Cotización rechazada'; l.descartedAt=Date.now(); dbUpsert('pb_leads', l); appAlert('Cotización rechazada. Cliente movido a Descartados.'); }
  }
  renderCotTable();
}

function renderCalendar(){
  const startDow=new Date(progAnio,progMes,1).getDay(), ndays=new Date(progAnio,progMes+1,0).getDate();
  let html=`<div class="cal-grid mb-2">${['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'].map(d=>`<div class="text-xs font-bold text-center text-slate-500">${d}</div>`).join('')}</div><div class="cal-grid">`;
  for(let i=0;i<startDow;i++) html+='<div class="cal-cell" style="background:#f8fafc"></div>';
  for(let d=1;d<=ndays;d++){
    const dTime=new Date(progAnio,progMes,d).getTime();
    let evts=DB.services.filter(s=>s.fecha && new Date(s.fecha).toDateString()===new Date(dTime).toDateString());
    if(progTec) evts=evts.filter(s=>s.tecnicoId===progTec);
    
    html+=`<div class="cal-cell" ${!isTecnico() ? `ondragover="event.preventDefault(); this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="this.classList.remove('drag-over'); dropCal(event, ${dTime})"` : ''}>
      <span class="d">${d}</span>${evts.map(e=>`
      <span class="cal-evt ${e.status==='cancelado'?'cancelado':e.tipo}" draggable="${!isTecnico()}" ondragstart="event.dataTransfer.setData('srv_id','${e.id}')" onclick="openSrvModal('${e.id}')">
        ${new Date(e.fecha).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})} ${DB.leads.find(x=>x.id===e.leadId)?.nombre.slice(0,10)||''}
      </span>`).join('')}</div>`;
  }
  document.getElementById('cal-grid-wrap').innerHTML=html+'</div>';
}
function dropCal(e, targetTime){
  const id=e.dataTransfer.getData('srv_id'); if(!id)return;
  const s=DB.services.find(x=>x.id===id);
  const oldDate=s.fecha;
  const d=new Date(targetTime); 
  if(oldDate){ const od=new Date(oldDate); d.setHours(od.getHours(), od.getMinutes()); } 
  else { d.setHours(9,0); } 
  
  if(oldDate) {
    if(!s.reagendamientos) s.reagendamientos=[];
    s.reagendamientos.push({de:oldDate, a:d.getTime(), motivo:'Drag & Drop', user:session.userId, ts:Date.now()});
  }
  s.fecha=d.getTime(); 
  dbUpsert('pb_services', s);
  renderProgramacion(document.getElementById('page-content'));
}

function saveSrvBase(id){
  const s=DB.services.find(x=>x.id===id);
  const df=document.getElementById('svm-f').value;
  if(df) {
    const nd=new Date(df).getTime();
    if(s.fecha!==nd) {
      if(!s.reagendamientos) s.reagendamientos=[];
      s.reagendamientos.push({de:s.fecha, a:nd, motivo:'Edición Manual', user:session.userId, ts:Date.now()});
      s.fecha=nd;
    }
  }
  s.tecnicoId=document.getElementById('svm-t').value;
  s.monto=+document.getElementById('svm-m').value;
  s.notes=document.getElementById('svm-n').value;
  dbUpsert('pb_services', s); 
  
  if(currentPage==='programacion') {
      closeModal();
      appAlert('Programación guardada con éxito.');
      renderProgramacion(document.getElementById('page-content'));
  } else {
      appAlert('Datos base actualizados');
      renderSrvGrid();
  }
}

function srvAction(id, act){
  const s=DB.services.find(x=>x.id===id);
  if(act==='checkin'){ s.checkin=Date.now(); s.status='iniciado'; }
  if(act==='checkout'){ s.checkout=Date.now(); s.status='terminado'; }
  if(act==='cobrar_rapido'){
    const m = +document.getElementById('qc-m').value;
    const met = document.getElementById('qc-met').value;
    s.cobro = { monto: m, metodo: met, ts: Date.now(), user: session.userId };
    s.status = 'cobro_pendiente'; 
    appAlert('Cobro registrado y gastos guardados. El servicio pasó a "Pendiente de Autorización" para Finanzas.');
  }
  if(act==='cancelar'){ s.status='cancelado'; }
  
  dbUpsert('pb_services', s); 
  closeModal();
  if(currentPage==='servicios') renderSrvGrid();
}

function uploadEv(id, input){
  const s=DB.services.find(x=>x.id===id); if(!s.evidencias) s.evidencias=[];
  Array.from(input.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
        const MAX=800; const scale=img.width>MAX ? MAX/img.width : 1;
        canvas.width=img.width*scale; canvas.height=img.height*scale;
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        s.evidencias.push({url: canvas.toDataURL('image/jpeg', 0.6), ts: Date.now(), user: session.userId});
        dbUpsert('pb_services', s);
        if(document.getElementById('ev-container')) openSrvModal(id); 
      }; img.src=e.target.result;
    }; reader.readAsDataURL(file);
  });
}
function delEv(idx, id){ 
    const s=DB.services.find(x=>x.id===id); 
    s.evidencias.splice(idx,1); 
    dbUpsert('pb_services', s); 
    openSrvModal(id); 
}

function authCobro(srvId, approved){
  const s=DB.services.find(x=>x.id===srvId);
  if(approved){
    const newF = {id:uid('F'), tipo:'ingreso', categoria:'Servicio', monto:s.cobro.monto, metodo:s.cobro.metodo, fecha:Date.now(), ref:s.folio, desc:'Cobro de Servicio', isInvestment: false};
    DB.finances.push(newF);
    dbUpsert('pb_finances', newF);
    s.status='finalizado'; 
    appAlert('Ingreso aprobado e insertado en Finanzas.');
  } else {
    s.status='terminado'; delete s.cobro; 
    appAlert('Cobro rechazado. El servicio regresa a estado "Terminado". El técnico debe registrar el cobro nuevamente.');
  }
  dbUpsert('pb_services', s);
  renderFinanzas(document.getElementById('page-content'));
}

function saveFin(tipo, id){
  const d = {
      monto: +document.getElementById('ff-m').value,
      categoria: document.getElementById('ff-c').value,
      metodo: document.getElementById('ff-met').value,
      fecha: new Date(document.getElementById('ff-f').value + 'T12:00:00').getTime(), 
      desc: document.getElementById('ff-d').value,
      isInvestment: document.getElementById('ff-inv').checked
  };
  
  if(id){
     const f = DB.finances.find(x=>x.id===id);
     Object.assign(f, d);
     dbUpsert('pb_finances', f);
  } else {
     const nF = {id:uid('F'), tipo, ...d};
     DB.finances.push(nF);
     dbUpsert('pb_finances', nF);
  }
  closeModal(); renderFin();
}

       renderFin();
   }
}

function drawMarketingCharts() {
    destroyCharts('mkt');
    
    // Mapeo dinámico
    const mk = DB.marketing.map(m => {
        const mLeads = DB.leads.filter(l => l.campanaId === m.id).length;
        const mClientes = DB.leads.filter(l => l.campanaId === m.id && l.stageId === DB.settings.stageWonId).length;
        return { ...m, leads: mLeads + (m.leads||0), clientes: mClientes + (m.clientes||0) };
    });

    const totals = mk.reduce((acc, c) => {
        acc.i += c.inversion; acc.l += c.leads; acc.cl += c.clientes; return acc;
    }, {i:0, l:0, cl:0});

    document.getElementById('mk-l').textContent = totals.l;
    document.getElementById('mk-i').textContent = fmt$(totals.i);
    document.getElementById('mk-cpl').textContent = fmt$(totals.l ? totals.i/totals.l : 0);
    document.getElementById('mk-cac').textContent = fmt$(totals.cl ? totals.i/totals.cl : 0);

    const canales = DB.catalogs.canalesMkt;
    const stats = canales.map(can => {
        const d = mk.filter(x=>x.canal===can).reduce((a,b)=>{a.l+=b.leads; a.cl+=b.clientes; a.i+=b.inversion; return a;}, {l:0,cl:0,i:0});
        return { canal: can, ...d, cpl: d.l?d.i/d.l:0, cac: d.cl?d.i/d.cl:0, conv: d.l?(d.cl/d.l)*100:0 };
    });

    const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444'];
    
    dashCharts.mkt.c1 = new Chart(document.getElementById('mkt-leads-ch'), {
        type: 'bar', data: { labels: stats.map(s=>s.canal), datasets: [{ label: 'Leads', data: stats.map(s=>s.l), backgroundColor: colors }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} } }
    });

    dashCharts.mkt.c2 = new Chart(document.getElementById('mkt-conv-ch'), {
        type: 'bar', data: { labels: stats.map(s=>s.canal), datasets: [{ label: '% Conversión', data: stats.map(s=>s.conv.toFixed(1)), backgroundColor: '#11999E' }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} } }
    });

    dashCharts.mkt.c3 = new Chart(document.getElementById('mkt-cac-ch'), {
        type: 'bar', data: { 
            labels: stats.map(s=>s.canal), 
            datasets: [
                { label: 'CPL', data: stats.map(s=>s.cpl), backgroundColor: '#3b82f6' },
                { label: 'CAC', data: stats.map(s=>s.cac), backgroundColor: '#ef4444' }
            ] 
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const mKeys = [...new Set(mk.map(x=>x.anio+'-'+x.mes))].sort();
    const hLabels = mKeys.map(k=>MESES[k.split('-')[1]].substring(0,3));
    const hLeads = mKeys.map(k=>mk.filter(x=>x.anio+'-'+x.mes===k).reduce((a,b)=>a+b.leads,0));
    const hInv = mKeys.map(k=>mk.filter(x=>x.anio+'-'+x.mes===k).reduce((a,b)=>a+b.inversion,0));

    dashCharts.mkt.c4 = new Chart(document.getElementById('mkt-hist-ch'), {
        type: 'line', data: { 
            labels: hLabels, 
            datasets: [
                { label: 'Leads', data: hLeads, borderColor: '#10b981', yAxisID: 'y' },
                { label: 'Inversión ($)', data: hInv, borderColor: '#f59e0b', yAxisID: 'y1' }
            ] 
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { y: { type: 'linear', position: 'left' }, y1: { type: 'linear', position: 'right' } }
        }
    });
}

function saveMkt(id){
  const d = {
      nombre: document.getElementById('mf-n').value,
      canal: document.getElementById('mf-c').value,
      inversion: +document.getElementById('mf-i').value,
      mes: +document.getElementById('mf-m').value,
      anio: +document.getElementById('mf-a').value
  };
  if(id){
      const m = DB.marketing.find(x=>x.id===id);
      Object.assign(m, d);
      dbUpsert('pb_marketing', m);
  } else {
      const nM = {id:uid('M'), ...d, leads:0, clientes:0};
      DB.marketing.push(nM);
      dbUpsert('pb_marketing', nM);
  }
  closeModal(); renderMarketing(document.getElementById('page-content'));
}

function delMkt(id){
    if(confirm('¿Seguro que deseas eliminar esta campaña?')){
        DB.marketing = DB.marketing.filter(x=>x.id!==id);
        dbDelete('pb_marketing', id);
        renderMarketing(document.getElementById('page-content'));
    }
}

function drawVentasCharts() {
    destroyCharts('ven');
    const asesores = DB.users.filter(u=>u.rol==='ventas' || u.rol==='admin');
    
    const stats = asesores.map(u => {
        const leads = DB.leads.filter(l=>l.asesorId===u.id);
        const quotes = DB.quotes.filter(q=>q.asesorId===u.id);
        const qAceptadas = quotes.filter(q=>q.status==='aceptada');
        const facturado = qAceptadas.reduce((a,b)=>a+b.total,0);
        return {
            nombre: u.nombre, leads: leads.length, quotesEnviadas: quotes.length,
            quotesAceptadas: qAceptadas.length, facturado,
            conversion: leads.length ? (qAceptadas.length/leads.length)*100 : 0
        };
    }).filter(s=>s.leads > 0 || s.quotesEnviadas > 0).sort((a,b)=>b.facturado-a.facturado);

    document.getElementById('ven-table').innerHTML = `<thead><tr><th>Asesor</th><th>Leads Asignados</th><th>Cotiz. Enviadas</th><th>Cotiz. Aceptadas</th><th>Conversión</th><th>Total Facturado</th></tr></thead><tbody>
        ${stats.map(s=>`<tr><td class="font-bold">${s.nombre}</td><td>${s.leads}</td><td>${s.quotesEnviadas}</td><td class="text-green-600 font-bold">${s.quotesAceptadas}</td><td>${s.conversion.toFixed(1)}%</td><td class="text-blue-600 font-bold">${fmt$(s.facturado)}</td></tr>`).join('')}
    </tbody>`;

    dashCharts.ven.c1 = new Chart(document.getElementById('ven-rank-ch'), {
        type: 'bar', data: { labels: stats.map(s=>s.nombre), datasets: [{ label: 'Facturado ($)', data: stats.map(s=>s.facturado), backgroundColor: '#3b82f6' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} } }
    });

    dashCharts.ven.c2 = new Chart(document.getElementById('ven-conv-ch'), {
        type: 'bar', data: { labels: stats.map(s=>s.nombre), datasets: [{ label: '% Conversión', data: stats.map(s=>s.conversion.toFixed(1)), backgroundColor: '#10b981' }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} } }
    });
}

function drawTecnicosCharts() {

    const stats = tecnicos.map(u => {

    dashCharts.tec.c2 = new Chart(document.getElementById('tec-ing-ch'), {
        type: 'bar', data: { labels: stats.map(s=>s.nombre), datasets: [{ label: 'Monto ($)', data: stats.map(s=>s.ingreso), backgroundColor: '#8b5cf6' }] },

function getLast6Months() {
  let labels = [], keys = []; let d = new Date(); d.setDate(1); 
  for(let i=5; i>=0; i--) {
      let temp = new Date(d.getFullYear(), d.getMonth() - i, 1);
      labels.push(MESES[temp.getMonth()].substring(0,3) + ' ' + temp.getFullYear().toString().substring(2));
      keys.push(temp.getFullYear() + '-' + temp.getMonth());
  }
  return {labels, keys};
}

function drawDashboardCharts() {
  destroyCharts('dash');

  const activeLeads = DB.leads.filter(l=>l.status==='activo');
  const stageCounts = DB.stages.map(s => activeLeads.filter(l=>l.stageId===s.id).length);
  dashCharts.dash.c1 = new Chart(document.getElementById('ch-funnel'), {
      type: 'doughnut', data: { labels: DB.stages.map(s=>s.name), datasets: [{ data: stageCounts, backgroundColor: DB.stages.map(s=>s.color), borderWidth: 0, cutout: '70%' }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true, font: {size:10} } } } }
  });

  const monthsInfo = getLast6Months();

  const cats = DB.catalogs.categoriasGasto;
  const gastosData = cats.map(cat => monthsInfo.keys.map(k => {
      const [y, m] = k.split('-');
      return DB.finances.filter(f => f.tipo==='gasto' && !f.isInvestment && f.categoria===cat && new Date(f.fecha).getFullYear()==y && new Date(f.fecha).getMonth()==m).reduce((a,b)=>a+b.monto,0);
  }));
  const colors = ['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9'];
  dashCharts.dash.c2 = new Chart(document.getElementById('ch-gastos'), {
      type: 'bar', data: { labels: monthsInfo.labels, datasets: cats.map((cat, i) => ({ label: cat, data: gastosData[i], backgroundColor: colors[i%colors.length], borderRadius: 4 })) },
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid:{display:false} }, y: { stacked: true, border:{display:false} } }, plugins: { legend: { position: 'right', labels: { boxWidth: 10, usePointStyle: true, font: {size:10} } } } }
  });

  const ingresosData = monthsInfo.keys.map(k => { const [y, m] = k.split('-'); return DB.finances.filter(f => f.tipo==='ingreso' && !f.isInvestment && new Date(f.fecha).getFullYear()==y && new Date(f.fecha).getMonth()==m).reduce((a,b)=>a+b.monto,0); });
  const gastosTotalData = monthsInfo.keys.map(k => { const [y, m] = k.split('-'); return DB.finances.filter(f => f.tipo==='gasto' && !f.isInvestment && new Date(f.fecha).getFullYear()==y && new Date(f.fecha).getMonth()==m).reduce((a,b)=>a+b.monto,0); });

  const ctx3 = document.getElementById('ch-ingresos').getContext('2d');
  let gradient = ctx3.createLinearGradient(0, 0, 0, 400); gradient.addColorStop(0, 'rgba(17, 153, 158, 0.4)'); gradient.addColorStop(1, 'rgba(17, 153, 158, 0.0)');
  dashCharts.dash.c3 = new Chart(ctx3, {
      type: 'line', data: { labels: monthsInfo.labels, datasets: [
          { label: 'Ingresos Op.', data: ingresosData, borderColor: '#11999E', backgroundColor: gradient, borderWidth: 3, fill: true, tension: 0.4 },
          { label: 'Gastos Op.', data: gastosTotalData, borderColor: '#ef4444', borderDash: [5, 5], borderWidth: 2, fill: false, tension: 0.4 }
      ]},
      options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid:{display:false} }, y: { border:{display:false}, beginAtZero: true } }, plugins: { tooltip: { mode: 'index', intersect: false } } }
  });
}

  document.getElementById('cfg-cats').innerHTML=Object.keys(cs).map(k=>`
    <div><div class="label">${k.toUpperCase()}</div>
      <div class="space-y-1">${cs[k].map((v,i)=>`<div class="flex gap-1"><input class="input py-1 text-sm" value="${v}" onchange="DB.catalogs.${k}[${i}]=this.value;saveConfig()"/><button class="btn btn-danger py-1 px-2" onclick="DB.catalogs.${k}.splice(${i},1);saveConfig();renderCfgCats()">✕</button></div>`).join('')}</div>
      <button class="btn btn-outline text-xs mt-1" onclick="DB.catalogs.${k}.push('Nuevo');saveConfig();renderCfgCats()">+ Añadir</button>
    </div>`).join('');
}
function exportCSV(){
  const rows=[['ID','Nombre','Tel','Municipio','Tipo','Canal','Campaña ID','Plaga','Score','Etapa','Status']];
  DB.leads.forEach(l=>{ rows.push([l.id, l.nombre, l.tel, l.municipio, l.tipo, l.canal||'', l.campanaId||'', l.plaga, l.score, DB.stages.find(x=>x.id===l.stageId)?.name, l.status]); });
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n')); a.download='clientes.csv'; a.click();
}

// Inicialización asíncrona para esperar los datos de la nube
async function initApp() {
  await loadDB();
  const ss=sessionStorage.getItem('pb_sess_v11');
  if(ss){ 
    const s=JSON.parse(ss); 
    if(DB.users.find(u=>u.id===s.userId)){ 
      session=s; showApp(); 
    } else { document.getElementById('login-view').classList.remove('hidden'); }
  } else { document.getElementById('login-view').classList.remove('hidden'); }
}

initApp();
</script>
